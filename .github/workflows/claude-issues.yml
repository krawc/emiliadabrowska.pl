name: Claude Site Edit

on:
  issues:
    types: [labeled]

jobs:
  claude-edit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "claude-edit"
          prompt: |
            Zostałeś poproszony o wprowadzenie zmiany na stronie emiliadabrowska.pl.

            Treść zgłoszenia (issue #${{ github.event.issue.number }}):
            ---
            ${{ github.event.issue.body }}
            ---

            Wykonaj zmiany opisane powyżej.
          system_prompt: |
            Jesteś asystentem technicznym strony emiliadabrowska.pl, zbudowanej w Next.js 16 z App Router i Tailwind CSS.

            STRUKTURA PROJEKTU:
            - Treść każdej podstrony pochodzi z pliku JSON w `src/content/`:
              - `home.json` — strona główna
              - `wspolpraca.json` — współpraca
              - `podcast.json` — podcast (z listą odcinków)
              - `wydarzenia.json` — wydarzenia (z listą wydarzeń)
              - `sklep.json` — sklep (kategorie z produktami)
              - `kontakt.json` — kontakt (pola formularza, dane kontaktowe)
            - Pola `content` w JSON akceptują HTML (np. `<p>`, `<strong>`, `<h2>`, `<ul>`, `<a href="...">`)
            - Obrazki są w `public/images/` i referencjonowane jako `/images/nazwa.svg` lub `/images/nazwa.jpg`
            - Komponenty React są w `src/components/`, strony w `src/app/`

            ZASADY:
            1. Wprowadzaj TYLKO zmiany wprost opisane w zgłoszeniu. Nie refaktoryzuj, nie poprawiaj stylu, nie dodawaj niezamówionych funkcji.
            2. Jeśli zmiana dotyczy tylko treści (tekst, obrazki, ceny, daty) — edytuj wyłącznie odpowiedni plik JSON w `src/content/`.
            3. Jeśli zgłoszenie zawiera obrazki (linki do plików GitHub/załączniki), pobierz je i zapisz w `public/images/` pod opisową nazwą pliku.
            4. Po wprowadzeniu zmian otwórz Pull Request z:
               - Tytułem po polsku, zrozumiałym dla osoby nietechnicznej (np. "Aktualizacja tekstu na stronie głównej")
               - Opisem po polsku wyjaśniającym co zostało zmienione i dlaczego — bez żargonu technicznego
               - Referencją do issue (np. "Closes #123")
            5. Otwórz PR — zostanie automatycznie zmergowany przez workflow.
            6. Jeśli czegoś nie możesz zrobić bezpiecznie (np. prośba wymaga zmian spoza zakresu treści, lub jest niejasna), zostaw komentarz w issue wyjaśniający co jest potrzebne do realizacji. Nie otwieraj PR z częściowymi lub ryzykownymi zmianami.
            7. Jeśli prośba dotyczy dodania nowego odcinka podcastu, wydarzenia lub produktu w sklepie — dodaj nowy element do odpowiedniej tablicy w JSON, zachowując istniejącą strukturę.

      - name: Merge Claude changes to main
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin

          # Option A: open PR exists → merge it
          PR=$(gh pr list --state open --json number,headRefName \
            --jq ".[] | select(.headRefName | test(\"claude.*${ISSUE}\")) | .number" \
            | head -1)
          if [ -n "$PR" ]; then
            echo "Merging PR #$PR"
            gh pr merge "$PR" --squash --admin --delete-branch
            exit 0
          fi

          # Option B: branch exists but no PR → merge directly
          BRANCH=$(git branch -r | grep -E "origin/claude.*(issue-)?${ISSUE}" | head -1 | tr -d ' ')
          if [ -n "$BRANCH" ]; then
            echo "Merging branch $BRANCH directly"
            git checkout main
            git merge --squash "$BRANCH"
            git commit -m "Site edit from issue #${ISSUE}" || echo "Nothing to commit"
            git push origin main
            git push origin --delete "${BRANCH#origin/}" 2>/dev/null || true
            exit 0
          fi

          echo "No Claude changes found for issue #${ISSUE}"
